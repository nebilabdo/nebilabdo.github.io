<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Validation</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <i class="fa-solid fa-circle-info"></i>
        <i class="fa-solid fa-xmark"></i>
      </div>
      <h2>Insert Your Modal Title</h2>
      <p>
        a lazy fox jumps over the bloody cyborg. gets its data stolen to the
        cybernet.
      </p>
      <form action="">
        <label for="label1">Label</label><br />
        <div class="input-conatainer">
          <i class="fa-solid fa-user"></i>
          <input type="text" placeholder="Placeholder Text" />
          <i class="fa-solid fa-circle-question"></i>
        </div>
        <label for="label2">Label</label><br />
        <div class="input-conatainer">
          <i class="fa-solid fa-lock"></i>
          <input type="password" placeholder="**********" />
          <i class="fa-solid fa-eye"></i>
        </div>
      </form>
      <div class="border-container">
        <div class="border green"></div>
        <div class="border green"></div>
        <div class="border green"></div>
        <div class="border white"></div>
      </div>
      <p class="validation">This is a Validation text.</p>
      <div class="button">
        <button type="reset" class="Cancel-button">Cancel</button>
        <button type="submit" class="Submit-button">Accept</button>
      </div>
    </div>
  </body>
</html>
