<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Motivational Quotes</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="welcome-section">
      <h1>Welcome to the World of Inspiration!</h1>
      <p>Feel the power of words and start your day with motivation.</p>
    </div>

    <div class="quote-box">
      <div class="quote" id="quote">Press the button for a dev boost 💡</div>
      <span class="quote-author" id="author">– Unknown</span>
      <button class="btn" onclick="generateQuote()">New Quote</button>
    </div>

    <script src="js/script.js"></script>
  </body>
</html>
